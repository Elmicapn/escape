<!DOCTYPE html>
<html>
<head>
<title>Escape Code</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
font-size:20px;
}

button{
padding:10px 20px;
font-size:20px;
}
</style>

</head>

<body>

<h1>🔐 Entrez le code</h1>

<input id="code" placeholder="Code">
<button onclick="checkCode()">Valider</button>

<p id="message"></p>

<script>

async function sha256(message) {
const msgBuffer = new TextEncoder().encode(message);
const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function checkCode(){

let code = document.getElementById("code").value;

let hash = await sha256(code);

let correctHash = "6f8a8a9d2a6b3f7c6a4d91f2f6b0d7e6c5f1b3e0c7c9a2c2e6f3c8d4a9b1e2f7";

if(hash === correctHash){
document.getElementById("message").innerHTML =
"🎉 Bravo ! Vous avez résolu l'énigme.";
} else{
document.getElementById("message").innerHTML =
"❌ Mauvais code, réessayez.";
}

}

</script>

</body>
</html>
